# Portable deploy — works on any VPS with Docker. No vendor lock-in.
# Pulls the prebuilt, provenance-attested image from GHCR.
services:
  site:
    image: ghcr.io/k2gl/site:${SITE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-k2gl.com}
      # Basic-auth for the private /_stats GoAccess dashboard. Set both in .env on
      # the VPS; double every '$' in the bcrypt hash -> '$$' (compose interpolation).
      STATS_USER: ${STATS_USER:-}
      STATS_HASH: ${STATS_HASH:-}
    volumes:
      - caddy_data:/data # persisted TLS certs — keep this to avoid LE rate limits
      - caddy_config:/config
      - caddy_logs:/var/log/caddy # access logs, shared with the goaccess service
      - stats_report:/report:ro # GoAccess-rendered dashboard, served under /_stats
    healthcheck:
      # Caddy's admin API (localhost:2019) is up iff Caddy is serving; hitting the
      # public port would follow the 80->443 redirect and report unhealthy.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # The tools API (k2gl.com/tools): FrankenPHP running the k2gl packages. Only
  # reachable through the site container's /api/* proxy — no published ports.
  api:
    image: ghcr.io/k2gl/api:${SITE_TAG:-latest}
    restart: unless-stopped
    environment:
      # Optional: raises GitHub API rate limits for the attestation checker.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    healthcheck:
      test: ["CMD", "php", "-r", "exit(str_contains((string) @file_get_contents('http://127.0.0.1:8080/api/health'), '\"ok\":true') ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Renders the private GoAccess dashboard from Caddy's access logs. Reparses the
  # whole log (current + rolled .gz) every 60s and writes a self-contained report to
  # the stats_report volume, which the site container serves under /_stats. No ports,
  # no network exposure. Bots/crawlers/agents are intentionally counted — that's the
  # point of log-based analytics for a site that also serves .md/.json/llms.txt.
  goaccess:
    image: ghcr.io/k2gl/goaccess:${SITE_TAG:-latest}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while :; do
          { zcat /logs/access.log.*.gz 2>/dev/null; cat /logs/access.log 2>/dev/null; } \
            | goaccess - --log-format=CADDY --html-report-title=k2gl.com \
                --anonymize-ip --tz=UTC -o /report/index.html || true
          sleep 60
        done
    volumes:
      - caddy_logs:/logs:ro
      - stats_report:/report
    healthcheck:
      # Unhealthy if the report is missing or hasn't refreshed in 10 min — surfaces a
      # dead or stuck goaccess loop in `docker compose ps`.
      test: ["CMD-SHELL", "test -f /report/index.html && [ $$(( $$(date +%s) - $$(stat -c %Y /report/index.html) )) -lt 600 ]"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 180s

  # Daily restic backup of the TLS certs and access logs. Local repo by default
  # (guards against volume/container mistakes); point RESTIC_REPOSITORY at S3/B2
  # for true offsite. Password lives in .env (never in git).
  backup:
    image: mazzolino/restic:1.6.0
    restart: unless-stopped
    environment:
      RESTIC_REPOSITORY: /backups
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:?set RESTIC_PASSWORD in .env}
      BACKUP_CRON: "0 4 * * *"
      RESTIC_BACKUP_SOURCES: /data
      RESTIC_BACKUP_ARGS: --tag k2gl --host k2gl
      RESTIC_FORGET_ARGS: --keep-daily 7 --keep-weekly 4 --prune
    volumes:
      - caddy_data:/data/caddy:ro
      - caddy_logs:/data/caddy-logs:ro # raw access logs -> GoAccess history survives host loss
      - /opt/k2gl/backups:/backups

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:
  stats_report:
