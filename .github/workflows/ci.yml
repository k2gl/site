name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version comes from package.json "packageManager" (pnpm 9)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (astro + pagefind)
        run: pnpm build

      - name: Smoke — key routes exist
        run: |
          set -e
          for f in \
            dist/index.html \
            dist/packages.html \
            dist/packages/sigstore-verify.html \
            dist/packages/composer-attest.html \
            dist/blog.html \
            dist/blog/verify-composer-provenance.html \
            dist/guides.html \
            dist/packages/sigstore-verify.md \
            dist/packages/sigstore-verify.json \
            dist/llms.txt \
            dist/llms-full.txt \
            dist/sitemap-index.xml \
            dist/404.html \
            dist/robots.txt \
            dist/og.png \
            dist/.well-known/security.txt \
            dist/tools.html \
            dist/tools/dsse.html \
            dist/tools/sigstore-bundle.html \
            dist/tools/sd-jwt.html \
            dist/tools/composer-attestations.html
          do
            test -s "$f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "all key routes present"

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist
          if-no-files-found: error

  api:
    name: Test the tools API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Tests
        run: vendor/bin/phpunit

      - name: Enforce fluent test assertions
        run: |
          if grep -rnE '(self::|static::|\$this->|Assert::)assert[A-Za-z]*\(|->expectException' tests 2>/dev/null; then
            echo "::error::Tests must use fluent fact()/throws(), not native PHPUnit assertions."
            exit 1
          fi
