name: Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

# Serialize builds/deploys so rapid pushes don't race on the VPS.
concurrency:
  group: site-image-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build, push & attest the site image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/k2gl/site
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Attest the site image with build provenance — the family's own supply-chain
      # story applied to its own website.
      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/k2gl/site
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  goaccess:
    name: Build, push & attest the GoAccess image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/k2gl/goaccess
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: deploy/goaccess
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=goaccess
          cache-to: type=gha,scope=goaccess,mode=max

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/k2gl/goaccess
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  api:
    name: Build, push & attest the tools API image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/k2gl/api
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/k2gl/api
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  deploy:
    name: Deploy to VPS
    needs: [build, goaccess, api]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Ship compose & restart on the VPS over SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          install -m 600 /dev/stdin deploy_key <<< "$SSH_KEY"
          # Copy the compose straight from the runner. The VPS fetching it from
          # raw.githubusercontent was flaky (curl TLS eof) and, with no set -e,
          # silently left a stale file while the deploy still went green.
          scp -i deploy_key -o StrictHostKeyChecking=accept-new \
            deploy/docker-compose.yml "root@${VPS_HOST}:/opt/k2gl/docker-compose.yml"
          ssh -i deploy_key -o StrictHostKeyChecking=accept-new "root@${VPS_HOST}" 'set -e
            cd /opt/k2gl
            docker compose pull
            docker compose up -d --remove-orphans
            sleep 5
            docker compose ps'

      - name: Smoke the live site
        run: |
          set -e
          for p in / /llms.txt /packages/sigstore-verify.md /packages/array-reader.json \
                   /robots.txt /.well-known/security.txt /og.png; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://k2gl.com$p")
            echo "$p -> $code"
            [ "$code" = 200 ] || { echo "smoke failed on $p"; exit 1; }
          done
          # Misses must return the branded 404 page with a 404 status.
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://k2gl.com/definitely-missing-page")
          echo "/definitely-missing-page -> $code"
          [ "$code" = 404 ] || { echo "expected 404, got $code"; exit 1; }

      - name: Smoke the tools API
        run: |
          set -e
          curl -fsS --max-time 20 https://k2gl.com/api/health | grep -q '"ok":true'
          # One real inspection end to end: decode + verify a signed DSSE fixture.
          curl -fsS --max-time 30 -X POST https://k2gl.com/api/v1/dsse/inspect \
            -H 'content-type: application/json' \
            --data @.github/smoke/dsse-inspect.json | tee /tmp/dsse.json | grep -q '"verified":true'
          echo "tools API verified a fixture envelope"
